<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#f0dcc8"/>
      <stop offset="100%" style="stop-color:#dcc4ae"/>
    </linearGradient>
    <linearGradient id="eyes" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="sweater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f0c29"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="280" fill="url(#glow)"/>

  <!-- Ambient particles -->
  <circle cx="60" cy="380" r="1.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="440" cy="120" r="1.5" fill="#60a5fa" opacity="0.25"/>
  <circle cx="380" cy="440" r="1" fill="#a78bfa" opacity="0.2"/>
  <circle cx="90" cy="100" r="1" fill="#60a5fa" opacity="0.2"/>
  <circle cx="450" cy="300" r="1.5" fill="#a78bfa" opacity="0.15"/>

  <!-- ===== BODY / SHOULDERS ===== -->
  <path d="M 140 340 Q 140 420 120 512 L 392 512 Q 372 420 372 340 Z" fill="url(#sweater)"/>
  <!-- Collar / neckline -->
  <path d="M 210 340 Q 256 370 302 340" fill="none" stroke="#2d1b4e" stroke-width="2" opacity="0.6"/>

  <!-- ===== NECK ===== -->
  <rect x="226" y="260" width="60" height="85" rx="10" fill="#e8d0b8"/>
  <!-- neck shadow -->
  <path d="M 226 280 L 226 345 Q 226 355 256 355 Q 286 355 286 345 L 286 280" fill="none" stroke="#c4a88a" stroke-width="1.5" opacity="0.3"/>
  <!-- subtle adam's apple hint -->
  <ellipse cx="256" cy="310" rx="8" ry="4" fill="#d4b898" opacity="0.4"/>

  <!-- ===== HAIR (messy, swept) ===== -->
  <!-- Main hair mass -->
  <path d="M 170 200 
    Q 158 150 180 110 
    Q 200 80 240 70 
    Q 270 62 300 70 
    Q 340 80 350 120 
    Q 356 150 350 180
    Q 358 170 362 190
    Q 348 200 340 210
    Z" fill="url(#hair)"/>
  <!-- Additional hair volume on top -->
  <path d="M 175 180 
    Q 160 140 190 100 
    Q 220 70 260 65 
    Q 310 60 340 100 
    Q 360 130 355 170
    Z" fill="#2d1b4e"/>
  <!-- Side hair left -->
  <path d="M 175 180 Q 165 200 168 240 Q 170 260 175 270" fill="none" stroke="#2d1b4e" stroke-width="12" stroke-linecap="round"/>
  <!-- Side swept pieces -->
  <path d="M 200 85 Q 190 100 185 130 Q 180 155 195 175" fill="#2d1b4e" opacity="0.7"/>
  <!-- Forehead strand -->
  <path d="M 205 80 Q 195 110 210 145" fill="none" stroke="#2d1b4e" stroke-width="4" stroke-linecap="round" opacity="0.8"/>

  <!-- ===== FACE SHAPE ===== -->
  <path d="M 185 175 
    Q 175 210 178 260 
    Q 180 290 195 310 
    Q 210 325 230 330 
    Q 250 333 265 332
    Q 290 328 310 315
    Q 328 300 334 270
    Q 340 240 336 210
    Q 332 185 325 175
    Z" fill="url(#skin)"/>

  <!-- ===== EYEBROWS ===== -->
  <!-- Left -->
  <path d="M 195 195 Q 215 188 235 192" fill="none" stroke="#4a3728" stroke-width="3" stroke-linecap="round"/>
  <!-- Right -->
  <path d="M 270 190 Q 290 186 308 194" fill="none" stroke="#4a3728" stroke-width="3" stroke-linecap="round"/>

  <!-- ===== EYES ===== -->
  <!-- Sclera -->
  <ellipse cx="215" cy="210" rx="18" ry="10" fill="white" opacity="0.9"/>
  <ellipse cx="290" cy="208" rx="18" ry="10" fill="white" opacity="0.9"/>
  <!-- Iris -->
  <circle cx="215" cy="210" r="9" fill="url(#eyes)"/>
  <circle cx="290" cy="208" r="9" fill="url(#eyes)"/>
  <!-- Pupils -->
  <circle cx="215" cy="210" r="4.5" fill="#0a0a14"/>
  <circle cx="290" cy="208" r="4.5" fill="#0a0a14"/>
  <!-- Catchlight -->
  <circle cx="218" cy="207" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="293" cy="205" r="2.5" fill="white" opacity="0.8"/>
  <!-- Upper lid -->
  <path d="M 195 210 Q 215 200 235 210" fill="none" stroke="#3a2818" stroke-width="2.5"/>
  <path d="M 270 208 Q 290 198 310 208" fill="none" stroke="#3a2818" stroke-width="2.5"/>
  <!-- Lower lid hint -->
  <path d="M 200 216 Q 215 218 230 216" fill="none" stroke="#c4a88a" stroke-width="1" opacity="0.5"/>
  <path d="M 275 214 Q 290 216 305 214" fill="none" stroke="#c4a88a" stroke-width="1" opacity="0.5"/>

  <!-- ===== NOSE ===== -->
  <path d="M 256 210 Q 254 240 250 255 Q 248 262 252 265 Q 258 268 264 262 Q 268 258 262 245" fill="none" stroke="#c4a88a" stroke-width="1.8"/>
  <!-- Nostrils -->
  <ellipse cx="248" cy="262" rx="3.5" ry="2.5" fill="#c4a88a" opacity="0.4"/>
  <ellipse cx="264" cy="260" rx="3.5" ry="2.5" fill="#c4a88a" opacity="0.4"/>
  <!-- Nose bridge highlight -->
  <path d="M 256 212 L 256 245" stroke="#f0dcc8" stroke-width="1.5" opacity="0.3"/>

  <!-- ===== MOUTH ===== -->
  <path d="M 232 290 Q 245 298 256 298 Q 267 298 280 290" fill="none" stroke="#b8866a" stroke-width="2" stroke-linecap="round"/>
  <!-- Lower lip hint -->
  <path d="M 235 292 Q 248 303 256 303 Q 264 303 277 292" fill="none" stroke="#c48a68" stroke-width="1" opacity="0.4"/>
  <!-- Subtle smile line left -->
  <path d="M 225 288 Q 228 284 232 288" fill="none" stroke="#b8866a" stroke-width="0.8" opacity="0.3"/>
  <!-- Subtle smile line right -->
  <path d="M 287 288 Q 284 284 280 288" fill="none" stroke="#b8866a" stroke-width="0.8" opacity="0.3"/>

  <!-- ===== EARS ===== -->
  <path d="M 178 210 Q 170 220 172 240 Q 174 255 180 250 Q 185 245 182 230" fill="url(#skin)"/>
  <path d="M 325 208 Q 333 218 331 238 Q 329 253 323 248 Q 318 243 321 228" fill="url(#skin)"/>
  <!-- Ear shading -->
  <path d="M 178 218 Q 176 228 179 238" fill="none" stroke="#c4a88a" stroke-width="1" opacity="0.3"/>
  <path d="M 325 216 Q 327 226 324 236" fill="none" stroke="#c4a88a" stroke-width="1" opacity="0.3"/>

  <!-- ===== CHEEK / JAW SHADOWS ===== -->
  <ellipse cx="198" cy="270" rx="15" ry="10" fill="#c4a88a" opacity="0.08"/>
  <ellipse cx="310" cy="268" rx="15" ry="10" fill="#c4a88a" opacity="0.08"/>
  <!-- Jaw shadow -->
  <path d="M 195 310 Q 220 328 256 330 Q 290 328 315 310" fill="none" stroke="#b89878" stroke-width="1.5" opacity="0.15"/>

  <!-- ===== THOUGHT PARTICLES (subtle) ===== -->
  <circle cx="355" cy="170" r="3" fill="#a78bfa" opacity="0.4" filter="url(#softGlow)"/>
  <circle cx="370" cy="150" r="2" fill="#7c3aed" opacity="0.3"/>
  <circle cx="380" cy="160" r="1.5" fill="#60a5fa" opacity="0.25"/>
  <circle cx="365" cy="140" r="1" fill="#a78bfa" opacity="0.2"/>

  <!-- Faint circuit/thought lines -->
  <path d="M 360 170 Q 375 158 380 160" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>
  <path d="M 370 150 Q 380 145 380 160" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.15"/>
</svg>
