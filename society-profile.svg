<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded rect -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  
  <!-- Outer orbit ring -->
  <ellipse cx="128" cy="128" rx="96" ry="96" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.15"
    stroke-dasharray="6 8"/>
  
  <!-- Connection lines between outer nodes -->
  <line x1="128" y1="48" x2="208" y2="128" stroke="url(#glow)" stroke-width="1" opacity="0.25"/>
  <line x1="208" y1="128" x2="128" y2="208" stroke="url(#glow)" stroke-width="1" opacity="0.25"/>
  <line x1="128" y1="208" x2="48" y2="128" stroke="url(#glow)" stroke-width="1" opacity="0.25"/>
  <line x1="48" y1="128" x2="128" y2="48" stroke="url(#glow)" stroke-width="1" opacity="0.25"/>
  
  <!-- Center connections -->
  <line x1="128" y1="48" x2="128" y2="128" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  <line x1="208" y1="128" x2="128" y2="128" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  <line x1="128" y1="208" x2="128" y2="128" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  <line x1="48" y1="128" x2="128" y2="128" stroke="#a78bfa" stroke-width="1" opacity="0.2"/>
  
  <!-- Horizontal and vertical cross connections -->
  <line x1="128" y1="48" x2="128" y2="208" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>
  <line x1="48" y1="128" x2="208" y2="128" stroke="#7c3aed" stroke-width="0.5" opacity="0.1"/>
  
  <!-- Outer node 1 - Top -->
  <circle cx="128" cy="48" r="18" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.8"/>
  <circle cx="128" cy="48" r="6" fill="url(#accent)"/>
  
  <!-- Outer node 2 - Right -->
  <circle cx="208" cy="128" r="18" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.8"/>
  <circle cx="208" cy="128" r="6" fill="url(#accent)"/>
  
  <!-- Outer node 3 - Bottom -->
  <circle cx="128" cy="208" r="18" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.8"/>
  <circle cx="128" cy="208" r="6" fill="url(#accent)"/>
  
  <!-- Outer node 4 - Left -->
  <circle cx="48" cy="128" r="18" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.8"/>
  <circle cx="48" cy="128" r="6" fill="url(#accent)"/>
  
  <!-- Center node (Hermes / hub) -->
  <circle cx="128" cy="128" r="28" fill="url(#glow)" opacity="0.1"/>
  <circle cx="128" cy="128" r="20" fill="none" stroke="url(#glow)" stroke-width="2.5"/>
  <circle cx="128" cy="128" r="8" fill="url(#accent)"/>
  
  <!-- Small scattered particles -->
  <circle cx="82" cy="62" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="188" cy="62" r="1.5" fill="#60a5fa" opacity="0.3"/>
  <circle cx="188" cy="190" r="2" fill="#a78bfa" opacity="0.4"/>
  <circle cx="72" cy="182" r="1.5" fill="#60a5fa" opacity="0.3"/>
  <circle cx="100" cy="100" r="1" fill="#a78bfa" opacity="0.2"/>
  <circle cx="160" cy="150" r="1" fill="#60a5fa" opacity="0.2"/>
</svg>
